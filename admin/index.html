<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws - Admin Management Dashboard</title>
    <!-- Loads Tailwind CSS for instant premium styling -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- Branded Dashboard Header Bar -->
    <nav class="bg-white shadow-sm border-b border-slate-100">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-teal-600 tracking-tight flex items-center gap-2">
                🐾 <span class="text-slate-900">Paws&</span>Claws <span class="text-xs bg-teal-50 text-teal-700 font-bold px-2.5 py-1 rounded-md ml-2 border border-teal-100">Management Panel</span>
            </div>
            <a href="../index.html" class="text-sm font-semibold text-slate-500 hover:text-teal-600 transition flex items-center gap-1">
                ← View Live Website
            </a>
        </div>
    </nav>

    <!-- Main Workspace Container -->
    <main class="max-w-xl w-full mx-auto px-6 py-12 flex-grow flex items-center justify-center">
        <!-- Premium Branded Form Card Container -->
        <div class="w-full bg-white rounded-3xl shadow-xl shadow-slate-100 border border-slate-100 p-8 space-y-6">
            
            <div class="text-center pb-2">
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Update Website Content</h1>
                <div class="w-12 h-1 bg-teal-500 mx-auto rounded-full mt-3 mb-2"></div>
                <p class="text-slate-400 text-xs">Modify pricing, status updates, and announcement text fields below.</p>
            </div>

            <form id="cms-editor-form" class="space-y-5">
                <!-- Input 1: Status Alert Banner -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">🟢 Top Operational Status Alert</label>
                    <input type="text" id="form-status-banner" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 outline-none transition text-sm text-slate-700 font-medium">
                </div>

                <!-- Input 2: Hero Main Headline Title Text -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">📢 Main Hero Headline Title</label>
                    <textarea id="form-hero-title" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 outline-none transition text-sm text-slate-700 leading-relaxed resize-none"></textarea>
                </div>

                <!-- Double Input Split Grid Row for Medical Pricing Packages Metrics -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">💵 Consultation Fee</label>
                        <input type="text" id="form-consult-price" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 outline-none transition text-sm text-slate-700 font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">🏨 Boarding Cost (Per Night)</label>
                        <input type="text" id="form-boarding-price" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 outline-none transition text-sm text-slate-700 font-semibold">
                    </div>
                </div>

                <!-- Input 5: Room Slot Availability Numbers -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">🚨 Boarding Availability Status Tag</label>
                    <input type="text" id="form-boarding-slots" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-teal-500 focus:ring-4 focus:ring-teal-100 outline-none transition text-sm text-slate-700 font-medium">
                </div>

                <!-- Action Button Layout -->
                <button type="button" onclick="saveClinicData()" class="w-full bg-teal-600 text-white font-bold py-3.5 rounded-xl hover:bg-teal-700 transition shadow-lg shadow-teal-600/10 mt-4 text-sm tracking-wide">
                    Publish Updates Live
                </button>
            </form>
        </div>
    </main>

    <!-- Professional Dashboard Footer -->
    <footer class="bg-slate-900 text-slate-500 text-center py-6 text-xs border-t border-slate-800">
        <p>© 2026 Paws & Claws Veterinary Clinic. Secure Local Management Module Node.</p>
    </footer>

    <script>
        // Automatically reads your current live values from content.json file paths
        fetch('../content.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('form-status-banner').value = data.status_banner;
                document.getElementById('form-hero-title').value = data.hero_title;
                document.getElementById('form-consult-price').value = data.consult_price;
                document.getElementById('form-boarding-price').value = data.boarding_price;
                document.getElementById('form-boarding-slots').value = data.boarding_slots;
            })
            .catch(err => console.error("Error reading JSON mapping file structure:", err));

        // Trigger alert confirmation notification mock workflow on click
        function saveClinicData() {
            alert("Success! Changes written to secure data nodes. Rebuilding files to live servers.");
        }
    </script>
</body>
</html>
