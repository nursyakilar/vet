<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws - Admin Management Dashboard</title>
    <!-- Links directly to your shared style file -->
    <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">

    <!-- Branded Dashboard Header Bar -->
    <nav class="navbar admin-navbar">
        <div class="max-width-container nav-flex">
            <a href="../index.html" class="logo">🐾 <span>Paws&</span>Claws <span class="admin-panel-badge">Management Panel</span></a>
            <div class="nav-links">
                <a href="../index.html" style="margin-right: 0;">← View Live Site</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace Container -->
    <main class="admin-main">
        <div class="dashboard-card">
            
            <div class="dashboard-card-header">
                <h1>Update Website Content</h1>
                <div class="teal-divider"></div>
                <p>Modify pricing values, vacancy markers, and alert banner layouts below.</p>
            </div>

            <form id="cms-editor-form">
                <!-- Input 1: Status Alert Banner -->
                <div class="admin-form-group">
                    <label class="admin-input-label">🟢 Top Operational Status Alert</label>
                    <input type="text" id="form-status-banner" class="admin-input-control">
                </div>

                <!-- Input 2: Hero Main Headline Title Text -->
                <div class="admin-form-group">
                    <label class="admin-input-label">📢 Main Hero Headline Title</label>
                    <textarea id="form-hero-title" rows="2" class="admin-input-control" style="resize: none; line-height: 1.6; height: auto;"></textarea>
                </div>

                <!-- Double Input Split Grid Row for Pricing Package Metrics -->
                <div class="form-row-split" style="margin-bottom: 20px;">
                    <div>
                        <label class="admin-input-label">💵 Consultation Fee</label>
                        <input type="text" id="form-consult-price" class="admin-input-control" style="font-weight: 700;">
                    </div>
                    <div>
                        <label class="admin-input-label">🏨 Boarding Cost (Per Night)</label>
                        <input type="text" id="form-boarding-price" class="input-control admin-input-control" style="font-weight: 700;">
                    </div>
                </div>

                <!-- Input 5: Room Slot Availability Numbers -->
                <div class="admin-form-group">
                    <label class="admin-input-label">🚨 Boarding Availability Status Tag</label>
                    <input type="text" id="form-boarding-slots" class="admin-input-control">
                </div>

                <!-- Action Button Layout -->
                <div style="margin-top: 24px;">
                    <button type="button" onclick="saveClinicData()" class="btn-admin-submit">Publish Updates Live</button>
                </div>
            </form>

        </div>
    </main>

    <!-- Branded Dashboard Footer Layer -->
    <footer style="margin-top: 0;">
        <div class="max-width-container">
            <p>© 2026 Paws & Claws Veterinary Clinic. Secure Local Management Module Node.</p>
        </div>
    </footer>

    <script>
    // FIX: Using an absolute URL path so the browser never blocks the data stream across networks
    const dataUrl = 'https://github.io';
    const REPO_PATH = "nursyakilar/vet_clinic";

    // 1. Fetch and auto-populate existing live values into form inputs
    fetch(dataUrl + '?nocache=' + new Date().getTime())
        .then(res => {
            if (!res.ok) throw new Error('Data file connection refused');
            return res.json();
        })
        .then(data => {
            document.getElementById('form-status-banner').value = data.status_banner || '';
            document.getElementById('form-hero-title').value = data.hero_title || '';
            document.getElementById('form-consult-price').value = data.consult_price || '';
            document.getElementById('form-boarding-price').value = data.boarding_price || '';
            document.getElementById('form-boarding-slots').value = data.boarding_slots || '';
        })
        .catch(err => {
            console.error("Could not fetch live data:", err);
            // Fallback default values so fields are NEVER empty if a fetch fails
            document.getElementById('form-status-banner').value = "🟢 Current Status: Open Today until 8:00 PM. Walk-ins Welcome!";
            document.getElementById('form-hero-title').value = "Premium Medical Care & Luxury Boarding For Your Pets";
            document.getElementById('form-consult-price').value = "RM 40 - RM 60";
            document.getElementById('form-boarding-price').value = "RM 35";
            document.getElementById('form-boarding-slots').value = "5 Slots Left!";
        });

    // 2. Safe Save Function via secure prompt loop
    function saveClinicData() {
        const GH_TOKEN = prompt("Enter your secure GitHub Access Token to authorize these live updates:");
        
        if (!GH_TOKEN) {
            alert("Save cancelled. An authorized token string is required.");
            return;
        }

        const button = document.querySelector('.btn-admin-submit');
        button.innerText = "Publishing Live...";
        button.disabled = true;

        const updatedData = {
            status_banner: document.getElementById('form-status-banner').value,
            hero_title: document.getElementById('form-hero-title').value,
            consult_price: document.getElementById('form-consult-price').value,
            boarding_price: document.getElementById('form-boarding-price').value,
            boarding_slots: document.getElementById('form-boarding-slots').value
        };

        const commitUrl = `https://github.com{REPO_PATH}/contents/content.json`;

        // Fetch current file signature mapping to prevent overwrite conflicts
        fetch(commitUrl, {
            headers: { 'Authorization': `token ${GH_TOKEN}` }
        })
        .then(res => {
            if (!res.ok) throw new Error('Invalid token or repository access denied.');
            return res.json();
        })
        .then(fileInfo => {
            const currentSha = fileInfo.sha;
            const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(updatedData, null, 2))));

            return fetch(commitUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GH_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Content updated via Dashboard Interface Panel",
                    content: updatedContentBase64,
                    sha: currentSha,
                    branch: "main"
                })
            });
        })
        .then(response => {
            if (!response.ok) throw new Error('GitHub API Connection Refused');
            alert("🎉 Success! Your changes have been pushed to GitHub. The live site will refresh inside 30 seconds!");
        })
        .catch(err => {
            console.error(err);
            alert("Security Error: " + err.message);
        })
        .finally(() => {
            button.innerText = "Publish Updates Live";
            button.disabled = false;
        });
    }
</script>
</body>
</html>
