    <script>
        // Inline Production Configuration Injection
        // This replaces config.yml completely and forces the dashboard to render!
        window.CMS_CONFIG = {
            backend: {
                name: 'git-gateway',
                branch: 'main'
            },
            media_folder: 'images',
            public_folder: '/images',
            collections: [{
                name: 'homepage_data',
                label: 'Edit Website Content',
                files: [{
                    file: 'content.json', // Points directly to your root data file
                    label: 'Live Pricing & Text Alerts',
                    name: 'content_map',
                    fields: [
                        { label: 'Top Status Banner Alert', name: 'status_banner', widget: 'string' },
                        { label: 'Main Hero Heading Text', name: 'hero_title', widget: 'text' },
                        { label: 'Consultation Base Price', name: 'consult_price', widget: 'string' },
