local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - file: "src/data/content.json"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Announcement Banner", name: "announcement", widget: "string" }
          - { label: "Consultation Price", name: "price_consult", widget: "string" }
          - { label: "Boarding Slots Available", name: "boarding_slots", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp_num", widget: "string" }
